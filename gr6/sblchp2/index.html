<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Quiz - Grade 6 SBL Chapter 2</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #e0eafc, #cfdef3); overflow: hidden; }
        
        /* Bubble Background */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0); } 100% { transform: translateY(-110vh); } }

        /* UI Containers */
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #quiz-container, #intro-screen { background: rgba(255, 255, 255, 0.95); width: 95%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .hidden { display: none !important; }
        .option-btn { border: 2px solid #3498db; border-radius: 10px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: 600; transition: 0.3s; }
        .option-btn:hover { background: #3498db; color: white; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #q-text { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div class="bubble-bg" id="bubbles"></div>

<div id="intro-screen" class="hidden">
    <h1>Basics of a Circuit and Breadboard Quiz</h1>
    <div style="margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
        <p><strong>Grade:</strong> 6 | <strong>Subject:</strong> ICT</p>
        <p><strong>Topic:</strong>Circuits using Breadboard and Arduino UNO</p> 
        <p><strong>Questions:</strong> 12</p>
    </div>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px;">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="game-area">
        <div id="top-bar" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
    { q: "You are building a prototype for a string of holiday lights in Tinkercad. If you connect three light bulbs end-to-end with a battery so there is only one path for the current, what type of circuit are you creating?", a: "B) Series Circuit", options: ["A) Parallel Circuit", "B) Series Circuit", "C) Short Circuit", "D) Open Circuit"], hint: "In this type of circuit, electricity has only one path to follow." },
    { q: "A student wants to build a smart dustbin that opens automatically when someone approaches. They need a device that can read inputs from a distance sensor and control a motor. Which open-source platform is most suitable for this?", a: "C) Arduino", options: ["A) A plastic breadboard", "B) A battery and an LED", "C) Arduino", "D) DC Barrel Jack"], hint: "Consider the open-source platform that combines hardware and software for reading inputs and creating outputs." },
    { q: "You are repairing an Arduino UNO board and notice the main processing chip is damaged. Which specific microcontroller chip is known as the 'heart' of the Arduino UNO and needs to be replaced?", a: "A) ATmega328P", options: ["A) ATmega328P", "B) Intel Core i5", "C) ATMega2560", "D) ARM Cortex"], hint: "This chip is the primary microcontroller used in the Arduino UNO." },
    { q: "You are designing a weather station using an Arduino UNO and need to connect several digital sensors. What is the maximum number of dedicated digital input/output pins available on this board?", a: "D) 14", options: ["A) 6", "B) 10", "C) 13", "D) 14"], hint: "The board features a specific count of digital pins for input and output operations." },
    { q: "While developing a robotics project, your Arduino is connected to your laptop via a USB cable. Besides allowing you to communicate and upload your newly written code, what other primary function does this USB connection serve?", a: "B) It powers the Arduino board directly.", options: ["A) It acts as a distance sensor.", "B) It powers the Arduino board directly.", "C) It cools down the microcontroller.", "D) It increases the voltage to 12V."], hint: "The USB connection provides both data communication and the necessary electrical power." },
    { q: "You want your Arduino-based smart car to run independently without being connected to a computer. You decide to use a battery pack. Where should you plug in this 7-12V battery pack to supply power to the board?", a: "C) DC Barrel Jack", options: ["A) USB Port", "B) Reset Button", "C) DC Barrel Jack", "D) Digital Pin 13"], hint: "This specific component is designed for external power supplies ranging from 7 to 12V." },
    { q: "You have written a new code for your Arduino but don't have any external LEDs or components to test if the board is working. Which pin has an inbuilt LED connected to it for testing and debugging?", a: "C) Pin 13", options: ["A) Pin 8", "B) Pin 10", "C) Pin 13", "D) Pin 1"], hint: "Look for the pin associated with the onboard LED used for troubleshooting." },
    { q: "A developer is hired to write code for an automated watering system using an Arduino UNO. Which programming language is the Arduino IDE primarily based on for writing these instructions?", a: "B) C++", options: ["A) Python", "B) C++", "C) Java", "D) HTML"], hint: "The IDE uses a well-known industry programming language." },
    { q: "A beginner is learning to program an Arduino in Tinkercad but finds typing text-based code difficult. What alternative method does Tinkercad provide by default to program the Arduino easily?", a: "C) Block coding", options: ["A) Voice commands", "B) Drawing circuits manually", "C) Block coding", "D) Assembly language"], hint: "This visual programming method is the default coding view in Tinkercad." },
    { q: "Your Arduino-based digital clock has frozen and stopped updating the time due to a software glitch. Which component on the Arduino UNO board should you use to restart the microcontroller's program from the beginning?", a: "B) Reset button", options: ["A) Power LED", "B) Reset button", "C) USB Port", "D) DC Barrel Jack"], hint: "This button is specifically used to trigger a restart of the microcontroller chip." },
    { q: "You are building a lighting system on a physical breadboard where multiple LEDs are connected. You configure it so that if one LED burns out, the others continue to glow because they have their own paths to the power source. What type of circuit is this?", a: "C) Parallel Circuit", options: ["A) Series Circuit", "B) Sequential Circuit", "C) Parallel Circuit", "D) Short Circuit"], hint: "Think of a circuit where components have independent paths for current." },
    { q: "A student downloads the Arduino software to write programs. This software provides a code editor, compiler, and upload tool all combined into a single graphical interface. What is the technical term for this type of software?", a: "C) Integrated Development Environment (IDE)", options: ["A) Microcontroller", "B) Operating System", "C) Integrated Development Environment (IDE)", "D) Bootloader"], hint: "It is an environment used for building applications that combines several tools into one interface." }
];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    // Create bubbles
    const bg = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 5 + 's';
        bg.appendChild(b);
    }

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); document.getElementById('intro-screen').classList.remove('hidden'); }, 3000));

    function startQuiz() { document.getElementById('intro-screen').classList.add('hidden'); document.getElementById('quiz-container').classList.remove('hidden'); renderQuestion(); }

    function renderQuestion() {
        clearInterval(timer); attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = ""; document.getElementById('feedback').innerText = "";
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = o; btn.onclick = () => checkAnswer(o); optDiv.appendChild(btn); });
        timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++; document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct'; feedback.innerText = "Correct!";
            correctSound.play(); confetti(); setTimeout(nextQuestion, 1000);
        } else {
            attempts++; wrongSound.play();
            if(attempts < 2) { feedback.className = 'hint-box'; feedback.innerText = "Hint: " + questions[currentQ].hint; }
            else { feedback.className = 'feedback-correct'; feedback.innerText = "Correct answer was: " + questions[currentQ].a; setTimeout(nextQuestion, 2000); }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else { document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer;">Restart Quiz</button>`; }
    }
</script>
</body>
</html>
