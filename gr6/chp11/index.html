<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Quiz - Grade 6 Chapter 11</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #e0eafc, #cfdef3); overflow: hidden; }
        
        /* Bubble Background */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0); } 100% { transform: translateY(-110vh); } }

        /* UI Containers */
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #quiz-container, #intro-screen { background: rgba(255, 255, 255, 0.95); width: 95%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .hidden { display: none !important; }
        .option-btn { border: 2px solid #3498db; border-radius: 10px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: 600; transition: 0.3s; }
        .option-btn:hover { background: #3498db; color: white; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #q-text { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div class="bubble-bg" id="bubbles"></div>

<div id="intro-screen" class="hidden">
    <h1>Quiz on Introduction to C</h1>
    <div style="margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
        <p><strong>Grade:</strong> 6 | <strong>Subject:</strong> ICT</p>
        <p><strong>Topic:</strong> Introduction to C</p> 
        <p><strong>Questions:</strong> 15</p>
    </div>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px;">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="game-area">
        <div id="top-bar" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
    { 
        q: "A student is creating a student grading system and needs to declare a variable to store the student's first name. According to the rules of C, which of the following is a valid variable name?", 
        a: "C) first_name", 
        options: ["A) 1st_name", "B) first name", "C) first_name", "D) char"], 
        hint: "Variables cannot start with numbers, contain spaces, or be reserved keywords." 
    },
    { 
        q: "A developer finishes writing the source code for a new C application. After compiling, which specific tool is responsible for combining different object files and library files to produce the final executable (.exe) file?", 
        a: "C) Linker", 
        options: ["A) Preprocessor", "B) Compiler", "C) Linker", "D) Interpreter"], 
        hint: "It 'connects' separate parts into one final piece." 
    },
    { 
        q: "You are building a weather application that reads temperature from a sensor. The temperature needs to be stored with decimal places (e.g., 36.55). If memory is constrained and you only have 4 bytes available for this variable, which data type should you use?", 
        a: "B) float", 
        options: ["A) int", "B) float", "C) double", "D) char"], 
        hint: "Think of the standard 4-byte type for single-precision decimals." 
    },
    { 
        q: "In a physics simulation program, you need to use the value of Pi (3.14159). To ensure this value is strictly protected and cannot be modified by other parts of the program during execution, how should it be defined?", 
        a: "B) As a constant", 
        options: ["A) As a standard float variable", "B) As a constant", "C) As an integer", "D) As a keyword"], 
        hint: "What do we call a value that is 'fixed' and unchangeable?" 
    },
    { 
        q: "A banking app is designed to deposit money into an account. However, due to a typo, the programmer used a minus sign (-) instead of a plus sign (+). The code compiles and runs without crashing, but the balances are wrong. What type of error is this?", 
        a: "A) Logical error", 
        options: ["A) Logical error", "B) Syntax error", "C) Compilation error", "D) Linking error"], 
        hint: "The code follows all grammar rules but fails to achieve the intended result." 
    },
    { 
        q: "You want to print the value of a float variable `temp` to the screen. Which format specifier must be used inside the `printf` function?", 
        a: "D) %f", 
        options: ["A) %d", "B) %c", "C) %s", "D) %f"], 
        hint: "It stands for the type of data being displayed." 
    },
    { 
        q: "A student writes a program to calculate the area of a rectangle. The code compiles, but during execution, the program tries to divide a number by zero, causing it to terminate unexpectedly. What is this type of error called?", 
        a: "C) Runtime error", 
        options: ["A) Syntax error", "B) Compilation error", "C) Runtime error", "D) Logical error"], 
        hint: "The error happens only while the program is actively running." 
    },
    { 
        q: "A programmer is writing a C program and forgets to put a semicolon (;) at the end of a statement. When attempting to compile, the compiler points out the error immediately. What type of error is this?", 
        a: "B) Syntax error", 
        options: ["A) Logical error", "B) Syntax error", "C) Runtime error", "D) Linking error"], 
        hint: "This is a violation of the language's 'grammar' rules." 
    },
    { 
        q: "In C, which header file must be included at the beginning of a program to use standard input and output functions like `printf` and `scanf`?", 
        a: "D) #include <stdio.h>", 
        options: ["A) #include <math.h>", "B) #include <conio.h>", "C) #include <stdlib.h>", "D) #include <stdio.h>"], 
        hint: "Think: 'Standard Input/Output'." 
    },
    { 
        q: "A developer wants to store a single character, such as 'A', in memory. Which data type is the most efficient choice?", 
        a: "A) char", 
        options: ["A) char", "B) int", "C) float", "D) string"], 
        hint: "It is the shortest data type, perfect for one character." 
    },
    { 
        q: "A programmer is writing a program to check if a user is eligible for a teen discount. Their age must be greater than 12 AND less than 20. Which logical operator must be used to combine these two conditions?", 
        a: "C) &&", 
        options: ["A) ||", "B) !=", "C) &&", "D) =="], 
        hint: "Think of the symbol that represents 'AND' logic." 
    },
    { 
        q: "A programmer attempts to create a variable to hold the interest rate and names it `double`. The compiler immediately throws an error. Why is this variable name invalid?", 
        a: "C) 'double' is a reserved keyword in C.", 
        options: ["A) It exceeds 31 characters.", "B) It contains a special symbol.", "C) 'double' is a reserved keyword in C.", "D) It does not start with an underscore."], 
        hint: "You cannot name a variable after a command or type built into the language." 
    },
    { 
        q: "You are reviewing a large C program consisting of multiple functions. To trace the flow of the program, you need to know where the execution begins. Which mandatory function should you look for?", 
        a: "D) main()", 
        options: ["A) start()", "B) printf()", "C) include()", "D) main()"], 
        hint: "Every C program needs this specific starting point." 
    },
    { 
        q: "In a ticketing queue system, the current ticket number is 10 (`ticket = 10;`). The system uses the pre-increment operator to assign the next ticket: `next_ticket = ++ticket;`. What is the value assigned to `next_ticket`?", 
        a: "B) 11", 
        options: ["A) 10", "B) 11", "C) 9", "D) 12"], 
        hint: "Pre-increment means change the value before assigning it." 
    },
    { 
        q: "While debugging, you want to temporarily disable a block of 5 lines of code without deleting them. Which symbols should you use to enclose these lines?", 
        a: "B) /* and */", 
        options: ["A) // and //", "B) /* and */", "C) { and }", "D) # and #"], 
        hint: "These are used for multi-line notes or disabling code blocks." 
    }
];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    // Create bubbles
    const bg = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 5 + 's';
        bg.appendChild(b);
    }

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); document.getElementById('intro-screen').classList.remove('hidden'); }, 3000));

    function startQuiz() { document.getElementById('intro-screen').classList.add('hidden'); document.getElementById('quiz-container').classList.remove('hidden'); renderQuestion(); }

    function renderQuestion() {
        clearInterval(timer); attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = ""; document.getElementById('feedback').innerText = "";
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = o; btn.onclick = () => checkAnswer(o); optDiv.appendChild(btn); });
        timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++; document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct'; feedback.innerText = "Correct!";
            correctSound.play(); confetti(); setTimeout(nextQuestion, 1000);
        } else {
            attempts++; wrongSound.play();
            if(attempts < 2) { feedback.className = 'hint-box'; feedback.innerText = "Hint: " + questions[currentQ].hint; }
            else { feedback.className = 'feedback-correct'; feedback.innerText = "Correct answer was: " + questions[currentQ].a; setTimeout(nextQuestion, 2000); }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else { document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer;">Restart Quiz</button>`; }
    }
</script>
</body>
</html>
