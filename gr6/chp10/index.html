<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Languages - Interactive Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #quiz-container { background: white; width: 95%; max-width: 600px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        .option-btn { border: 2px solid blue; border-radius: 15px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: bold; font-family: inherit; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #logo-screen, #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .hidden { display: none !important; }
        #q-text { font-weight: bold; font-size: 1.0rem; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/logo.png" alt="Logo"></div>

<div id="intro-screen" class="hidden">
    <h1>Computer Languages</h1>
    <p><strong>Grade:</strong> 6</p>
    <p><strong>Subject:</strong> ICT</p>
    <p><strong>Topic:</strong> Scenario-Based CBQ Session</p>
    <p><strong>No. of Questions:</strong> 12</p>
    <button onclick="startQuiz()" style="padding: 15px 30px; font-size: 18px; font-family: inherit; cursor: pointer;">Start Quiz</button>
</div>

<div id="quiz-container">
    <div id="game-area" class="hidden">
        <div id="top-bar">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
        { 
            q: "You wrote a program on an old computer using its native binary code (0s and 1s). When you try to run it on a new computer with a different processor, it doesn't work. What is the main reason for this?", 
            a: "Machine language is machine-dependent.", 
            options: [
                "Machine language requires an interpreter.", 
                "Machine language is machine-dependent.", 
                "Machine language programs take too long to execute.", 
                "Machine language uses English-like mnemonics."
            ], 
            hint: "Binary code is tightly bound to a specific processor architecture design." 
        },
        { 
            q: "A software developer is writing a program in Python. Upon running the code, the execution stops immediately on line 15 because of a typo, and an error message is displayed. Which type of translator is Python most likely using?", 
            a: "Interpreter", 
            options: ["Compiler", "Assembler", "Interpreter", "Linker"], 
            hint: "This type of translator reads and processes instructions line by line." 
        },
        { 
            q: "A gaming company writes a massive software program in C++. Before releasing it to the public, they translate the entire source code into an executable machine language file all at once. What translator did they use?", 
            a: "Compiler", 
            options: ["Assembler", "Compiler", "Interpreter", "Web Browser"], 
            hint: "Think about the translator system that builds complete binary files all at once." 
        },
        { 
            q: "You are managing a database using SQL. You type a simple query specifying exactly *what* data you need (e.g., 'SELECT names'), without writing the step-by-step logic on *how* the computer should fetch it. This is a characteristic of which generation of languages?", 
            a: "Fourth Generation (4GL)", 
            options: [
                "First Generation (1GL)", 
                "Second Generation (2GL)", 
                "Third Generation (3GL)", 
                "Fourth Generation (4GL)"
            ], 
            hint: "Non-procedural languages focus purely on the target goal rather than the step logic." 
        },
        { 
            q: "A programmer is working on low-level system code. Instead of entering binary numbers, they type commands like 'ADD A, B' or 'MOV AX, BX'. When they launch it, a translator program turns these shortcuts straight into machine code. What translator performed this process?", 
            a: "Assembler", 
            options: ["Assembler", "Compiler", "Interpreter", "Decompiler"], 
            hint: "This module handles mnemonic abbreviations inside low-level frameworks." 
        },
        { 
            q: "You are talking to an artificial intelligence engine that processes conversational voice prompts and builds its own algorithms to fix user computational errors without manual coding. This AI engine operates on tools from which language generation?", 
            a: "Fifth Generation Language", 
            options: [
                "Second Generation Language", 
                "Third Generation Language", 
                "Fourth Generation Language", 
                "Fifth Generation Language"
            ], 
            hint: "Artificial intelligence architectures represent the highest structural layer." 
        },
        { 
            q: "You want to write a program that can run perfectly on Windows, macOS, and Linux laptops without needing rewrite modifications for each distinct processor system. What category of language must you deploy?", 
            a: "High Level Language", 
            options: [
                "High Level Language", 
                "Machine Language", 
                "Low Level Assembly Language", 
                "First Generation Binary Code"
            ], 
            hint: "These systems are completely machine-independent platforms." 
        },
        { 
            q: "You are reading a history book about historical computer pioneers and discover the narrative of a brilliant woman who engineered the earliest algorithm meant for execution on Charles Babbage's Mechanical Analytical Engine. Who is this pioneer?", 
            a: "Lady Ada Lovelace", 
            options: ["Grace Hopper", "Lady Ada Lovelace", "Marie Curie", "Katherine Johnson"], 
            hint: "She is celebrated historically as the world's first software programmer." 
        },
        { 
            q: "You pass your high-level program's raw source code into a compiler system unit. What file output format does the compiler build that the computer processor can actively understand and run?", 
            a: "Object code", 
            options: ["Source code file", "Script text file", "Object code", "Document archive template"], 
            hint: "This is the generated translation output that microprocessors execute." 
        },
        { 
            q: "An engineer wants to protect a proprietary high-level app package from piracy so no competitor can extract or view the original source logic strings. Why would an interpreter NOT be the best choice for this deployment task?", 
            a: "Interpreters do not produce a separate object code file.", 
            options: [
                "Interpreters do not produce a separate object code file.", 
                "Interpreters translate all lines of code at once.", 
                "Interpreters only work with 1GL languages.", 
                "Interpreters are slower than humans at reading code."
            ], 
            hint: "Without a separate standalone translation output file, source text remains visible." 
        },
        { 
            q: "You are teaching a beginner how to write instructions using English-like words in a step-by-step manner (e.g., using languages like C or Java) to tell the computer exactly what to accomplish. This represents which generation?", 
            a: "Third Generation (3GL)", 
            options: [
                "First Generation (1GL)", 
                "Second Generation (2GL)", 
                "Third Generation (3GL)", 
                "Fifth Generation (5GL)"
            ], 
            hint: "Standard high-level procedural systems are placed inside this generational block." 
        },
        { 
            q: "A computer science student claims that High Level Languages are completely superior because they execute faster than Machine Language. Is this statement correct based on text parameters?", 
            a: "No, programs written in machine language take less time for execution.", 
            options: [
                "Yes, High Level Languages execute the fastest.", 
                "No, programs written in machine language take less time for execution.", 
                "Yes, because they do not require any translators.", 
                "No, because High Level Languages are machine-dependent."
            ], 
            hint: "Native binary execution skips the translator layer entirely." 
        }
    ];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;

    window.addEventListener('load', () => setTimeout(() => {
        document.getElementById('logo-screen').classList.add('hidden');
        document.getElementById('intro-screen').classList.remove('hidden');
    }, 5000));

    function startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        clearInterval(timer);
        attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = "";
        document.getElementById('feedback').innerText = "";
        
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = o;
            btn.onclick = () => checkAnswer(o);
            optDiv.appendChild(btn);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++;
            document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct';
            feedback.innerText = "Correct!";
            setTimeout(nextQuestion, 1000);
        } else {
            attempts++;
            if(attempts < 2) {
                feedback.className = 'hint-box';
                feedback.innerText = "Hint: " + questions[currentQ].hint;
            } else {
                feedback.className = 'feedback-correct';
                feedback.innerText = "Correct answer was: " + questions[currentQ].a;
                setTimeout(nextQuestion, 2000);
            }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else {
            document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()">Restart Quiz</button>`;
        }
    }
</script>
</body>
</html>
