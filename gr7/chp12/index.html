<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 7 ICT Chapter 12 MCQ Quiz</title>
<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#e0eafc,#cfdef3);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
.bubble{
  position:fixed;
  bottom:-80px;
  background:rgba(255,255,255,0.45);
  border-radius:50%;
  animation:rise 14s infinite ease-in;
  z-index:0;
}
@keyframes rise{
  from{transform:translateY(0);opacity:0;}
  50%{opacity:0.8;}
  to{transform:translateY(-120vh);opacity:0;}
}
#logoScreen{
  position:fixed;
  inset:0;
  background:white;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:center;
}
#logoScreen img{max-width:260px;width:70%;}
#logoText{font-size:36px;font-weight:bold;color:#273b63;}
.card{
  position:relative;
  z-index:1;
  width:90%;
  max-width:650px;
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
}
.hidden{display:none!important;}
h1{margin-top:0;color:#22324a;}
.info{
  background:#f7f9fc;
  padding:15px;
  border-radius:12px;
  text-align:left;
  line-height:1.6;
  margin:18px 0;
}
button{font-family:Arial,sans-serif;}
.startBtn,.nextBtn,.restartBtn{
  background:#2c3e50;
  color:white;
  border:0;
  border-radius:30px;
  padding:13px 32px;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}
.top{
  display:flex;
  justify-content:space-between;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
  font-weight:bold;
}
.pill{
  background:#eef6ff;
  border:1px solid #cde5ff;
  padding:8px 12px;
  border-radius:30px;
}
#question{
  text-align:left;
  font-size:18px;
  font-weight:bold;
  line-height:1.5;
  background:#f8fafc;
  border-left:5px solid #3498db;
  padding:15px;
  border-radius:10px;
  margin-bottom:14px;
}
.option{
  width:100%;
  display:block;
  margin:8px 0;
  padding:12px;
  text-align:left;
  font-size:16px;
  font-weight:600;
  border:2px solid #3498db;
  background:white;
  border-radius:10px;
  cursor:pointer;
}
.option:hover:not(:disabled){
  background:#3498db;
  color:white;
}
.option.correct{
  background:#d4edda;
  border-color:#22c55e;
  color:#14532d;
}
.option.wrong{
  background:#fee2e2;
  border-color:#ef4444;
  color:#7f1d1d;
}
.option:disabled{cursor:default;}
#feedback{
  min-height:40px;
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
}
.good{background:#d4edda;color:#155724;border:2px solid #22c55e;}
.bad{background:#fee2e2;color:#7f1d1d;border:2px solid #ef4444;}
.ans{background:#fff3cd;color:#856404;border:2px solid #facc15;}
.nextBtn{display:none;margin-top:12px;}
.scoreBig{font-size:48px;font-weight:bold;color:#2563eb;}
.confetti{
  position:fixed;
  top:-20px;
  z-index:9;
  animation:fall 2.3s linear forwards;
  pointer-events:none;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
@media(max-width:520px){
  body{align-items:flex-start;padding-top:15px;overflow-y:auto;}
  .card{padding:18px;}
  #question{font-size:16px;}
  .option{font-size:15px;}
}
</style>
</head>
<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" onerror="this.style.display='none';document.getElementById('logoText').style.display='block';">
  <div id="logoText" style="display:none;">INNOVINE</div>
</div>

<div id="intro" class="card hidden">
  <h1>C Programming Quiz</h1>
  <div class="info">
    <p><b>Grade:</b> 7</p>
    <p><b>Subject:</b> ICT</p>
    <p><b>Chapter:</b> 12</p>
    <p><b>Topic:</b> C Programming - Input, Output and Decision Making</p>
    <p><b>No. of Questions:</b> 10</p>
    <p><b>Rule:</b> Tap the correct option. You get 2 attempts.</p>
  </div>
  <button class="startBtn" onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quiz" class="card hidden">
  <div class="top">
    <div class="pill" id="timer">45s</div>
    <div class="pill" id="progress">Question 1/10</div>
    <div class="pill" id="score">Score: 0</div>
  </div>
  <div id="question"></div>
  <div id="options"></div>
  <div id="feedback"></div>
  <button id="nextBtn" class="nextBtn" onclick="nextQuestion()">Next</button>
</div>

<div id="result" class="card hidden">
  <h1>Quiz Finished!</h1>
  <p>You completed all questions.</p>
  <div class="scoreBig" id="finalScore">0/10</div>
  <p id="finalMessage"></p>
  <button class="restartBtn" onclick="restartQuiz()">Restart Quiz</button>
</div>

<audio id="correctAudio" src="assets/correct.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>
<audio id="clapAudio" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
var questions=[
{q:"Amit is writing a program to calculate the area of a circle. He wants the user to type in the radius while the program is running. Which function should he use to capture this user input?",a:"C. scanf()",o:["A. printf()","B. clrscr()","C. scanf()","D. getch()"],e:"scanf() is an input function that reads values from the user at run time."},
{q:"When using the scanf() function to read an integer into a variable named score, how should the variable be written inside the function?",a:"B. &amp;score",o:["A. score","B. &score","C. %score","D. *score"],e:"The variable should be written with an ampersand (&) to indicate its memory address."},
{q:"A programmer wants to display the message Welcome to C Programming on the monitor. Which function is responsible for this output operation?",a:"B. printf()",o:["A. scanf()","B. printf()","C. main()","D. include"],e:"printf() is an output function used to print text, constants, or variable values."},
{q:"To use printf() and scanf() in a C program, which header file must be included at the very beginning of the code?",a:"C. stdio.h",o:["A. conio.h","B. math.h","C. stdio.h","D. string.h"],e:"stdio.h contains standard input and output functions like printf() and scanf()."},
{q:"An automated voting system needs to check if a user is 18 years or older. If they are, it should display Eligible; otherwise, it should display Not Eligible. Which statement is best for choosing between these two specific options?",a:"B. if-else statement",o:["A. if statement","B. if-else statement","C. switch statement","D. printf statement"],e:"An if-else statement chooses between two possible options based on a condition."},
{q:"A weather app needs to categorize temperatures: Hot above 35, Pleasant from 20 to 35, and Cold below 20. Since there are more than two options, which nested structure is most appropriate?",a:"C. if-else-if statement",o:["A. if statement","B. if-else statement","C. if-else-if statement","D. clrscr()"],e:"An if-else-if statement is used when there are more than two possible conditions."},
{q:"You are building a menu-driven calculator where a user presses 1 for Add, 2 for Subtract, 3 for Multiply, and 4 for Divide. To avoid complex nested if-else structures, which statement is the most efficient choice?",a:"B. switch statement",o:["A. if-else","B. switch statement","C. printf","D. scanf"],e:"A switch statement tests a variable against a list of values and is useful for menu-driven choices."},
{q:"In a switch statement, what happens if you forget to put a break statement at the end of a case block?",a:"C. All subsequent cases will execute sequentially until a break or the end of the block is reached",o:["A. The program will crash immediately","B. Only the default case will execute","C. All subsequent cases will execute sequentially until a break or the end of the block is reached","D. The compiler will show an error and won't run"],e:"Without break, execution continues into the next case until a break or the end of the block is reached."},
{q:"Which part of a switch statement is executed if the input value does not match any of the defined case numbers?",a:"C. default",o:["A. case 1","B. break","C. default","D. main"],e:"The default part executes when no matching case is found."},
{q:"In a C program, what is the purpose of the symbols //?",a:"B. To indicate the start of a single-line comment that the compiler ignores",o:["A. To start a multi-line comment","B. To indicate the start of a single-line comment that the compiler ignores","C. To perform a division operation","D. To include a header file"],e:"// starts a single-line comment, and the compiler ignores the commented text."}
];

var current=0, marks=0, attempts=0, timeLeft=45, timer=null, locked=false;

function $(id){return document.getElementById(id);}
function hide(id){$(id).classList.add("hidden");}
function show(id){$(id).classList.remove("hidden");}

for(var i=0;i<15;i++){
  var b=document.createElement("div");
  b.className="bubble";
  var size=(Math.random()*60+20)+"px";
  b.style.width=size;
  b.style.height=size;
  b.style.left=(Math.random()*100)+"%";
  b.style.animationDelay=(Math.random()*8)+"s";
  document.body.appendChild(b);
}

setTimeout(function(){
  hide("logoScreen");
  show("intro");
},5000);

function startQuiz(){
  hide("intro");
  show("quiz");
  loadQuestion();
}

function loadQuestion(){
  clearInterval(timer);
  attempts=0;
  locked=false;
  timeLeft=45;
  $("timer").innerHTML=timeLeft+"s";
  $("progress").innerHTML="Question "+(current+1)+"/10";
  $("score").innerHTML="Score: "+marks;
  $("feedback").innerHTML="";
  $("feedback").className="";
  $("nextBtn").style.display="none";
  $("question").innerHTML=(current+1)+". "+questions[current].q;
  $("options").innerHTML="";
  for(var i=0;i<questions[current].o.length;i++){
    var btn=document.createElement("button");
    btn.className="option";
    btn.innerHTML=questions[current].o[i];
    btn.onclick=function(){checkAnswer(this);}
    $("options").appendChild(btn);
  }
  timer=setInterval(function(){
    timeLeft--;
    $("timer").innerHTML=timeLeft+"s";
    if(timeLeft<=0){
      showAnswer("Time up. Correct answer:");
    }
  },1000);
}

function checkAnswer(btn){
  if(locked || btn.disabled){return;}
  var choice=btn.innerHTML;
  if(choice===questions[current].a){
    locked=true;
    clearInterval(timer);
    marks++;
    $("score").innerHTML="Score: "+marks;
    btn.classList.add("correct");
    $("feedback").className="good";
    $("feedback").innerHTML="Correct! "+questions[current].e;
    try{$("correctAudio").play();$("clapAudio").play();}catch(e){}
    confetti();
    disableButtons();
    $("nextBtn").style.display="inline-block";
  }else{
    attempts++;
    btn.classList.add("wrong");
    try{$("wrongAudio").play();}catch(e){}
    if(attempts<2){
      $("feedback").className="bad";
      $("feedback").innerHTML="Wrong answer. Try once more.";
      btn.disabled=true;
    }else{
      showAnswer("Correct answer:");
    }
  }
}

function showAnswer(text){
  if(locked){return;}
  locked=true;
  clearInterval(timer);
  var all=document.querySelectorAll(".option");
  for(var i=0;i<all.length;i++){
    all[i].disabled=true;
    if(all[i].innerHTML===questions[current].a){
      all[i].classList.add("correct");
    }
  }
  $("feedback").className="ans";
  $("feedback").innerHTML=text+" "+questions[current].a+" — "+questions[current].e;
  $("nextBtn").style.display="inline-block";
}

function disableButtons(){
  var all=document.querySelectorAll(".option");
  for(var i=0;i<all.length;i++){all[i].disabled=true;}
}

function nextQuestion(){
  current++;
  if(current<questions.length){
    loadQuestion();
  }else{
    finishQuiz();
  }
}

function finishQuiz(){
  clearInterval(timer);
  hide("quiz");
  show("result");
  $("finalScore").innerHTML=marks+"/10";
  if(marks>=8){$("finalMessage").innerHTML="Excellent work!";}
  else if(marks>=5){$("finalMessage").innerHTML="Good effort! Revise once more.";}
  else{$("finalMessage").innerHTML="Keep practising!";}
  try{$("clapAudio").play();}catch(e){}
  confetti();
}

function restartQuiz(){
  current=0;
  marks=0;
  hide("result");
  show("intro");
}

function confetti(){
  var symbols=["🎉","⭐","✨","🎊"];
  for(var i=0;i<35;i++){
    var c=document.createElement("div");
    c.className="confetti";
    c.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];
    c.style.left=(Math.random()*100)+"vw";
    c.style.animationDelay=(Math.random()*0.4)+"s";
    document.body.appendChild(c);
    setTimeout((function(x){return function(){x.remove();};})(c),2500);
  }
}
</script>
</body>
</html>
