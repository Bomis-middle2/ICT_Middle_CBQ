<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Apps Quiz - Grade 6</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #e0eafc, #cfdef3); overflow: hidden; }
        
        /* Bubble Background */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0); } 100% { transform: translateY(-110vh); } }

        /* UI Containers */
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #quiz-container, #intro-screen { background: rgba(255, 255, 255, 0.95); width: 95%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .hidden { display: none !important; }
        .option-btn { border: 2px solid #3498db; border-radius: 10px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: 600; transition: 0.3s; }
        .option-btn:hover { background: #3498db; color: white; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #q-text { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div class="bubble-bg" id="bubbles"></div>

<div id="intro-screen" class="hidden">
    <h1>Google Applications Quiz</h1>
    <div style="margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
        <p><strong>Grade:</strong> 6 | <strong>Subject:</strong> ICT</p>
        <p><strong>Topic:</strong> Google Sheets, Slides, and Forms</p> 
        <p><strong>Questions:</strong> 15</p>
    </div>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px;">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="game-area">
        <div id="top-bar" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "You are a teacher who received student marks in an MS Excel (.xlsx) file from a colleague. You want to edit it collaboratively with another teacher. What should you do first?", a: "B) Import it to Google Drive and open with Google Sheets", options: ["A) Open it directly in Google Forms", "B) Import it to Google Drive and open with Google Sheets", "C) Copy all text and paste it into Google Slides", "D) It is impossible to open MS Excel files in Google Apps"], hint: "You need to upload the file to your drive to use Google's editing features." },
        { q: "You have a spreadsheet with 200 rows of data. When you scroll down, you forget what each column represents because the headings disappear. Which feature should you use to fix this?", a: "C) Freeze header rows", options: ["A) Hide rows and columns", "B) Move rows and columns", "C) Freeze header rows", "D) Delete the top row"], hint: "This keeps specific rows visible while you scroll." },
        { q: "You are creating a science presentation with your project group using Google Slides. You want your group members to be able to add their own slides to the same file. What level of access should you grant them when sharing?", a: "C) Editor", options: ["A) Viewer", "B) Commenter", "C) Editor", "D) Owner"], hint: "This level allows others to make changes to the document." },
        { q: "While reviewing your Google Slides presentation, you realize that slide 5 should actually be shown earlier, right after slide 1. How can you fix this without having to recreate the slide?", a: "C) Drag the slide to the new position in the sidebar", options: ["A) Copy the text, delete the slide, and create a new one", "B) Right-click the slide and select 'Duplicate'", "C) Drag the slide to the new position in the sidebar", "D) You cannot rearrange slides once created"], hint: "The sidebar allows you to easily reorder your presentation." },
        { q: "You are designing a feedback form in Google Forms and want to ask: 'Which of the following Google Apps do you use? (Select all that apply)'. Which question type is best suited for this?", a: "B) Checkboxes", options: ["A) Multiple choice", "B) Checkboxes", "C) Short answer", "D) Dropdown"], hint: "This option allows users to select more than one answer." },
        { q: "You want participants to rate a recent workshop on a scale from 1 (Poor) to 5 (Excellent). Which question type should you select in Google Forms?", a: "A) Linear scale", options: ["A) Linear scale", "B) Multiple choice grid", "C) Paragraph", "D) Checkboxes"], hint: "This type is specifically designed for numerical ratings." },
        { q: "You have created an online survey about 'Safety Measures While Using the Internet'. How can you distribute this form so others can fill it out?", a: "A) Send it via email, share a link, or embed it on a website", options: ["A) Send it via email, share a link, or embed it on a website", "B) Print it out and have them scan it back to you", "C) Add them as 'Editors' on the form", "D) Only by sharing it via social media"], hint: "Google Forms provides several ways to share the link to your survey." },
        { q: "You are nervous about forgetting important details while giving a presentation. You want to have your talking points visible to you, but not to the audience. What feature in Google Slides should you use?", a: "B) Speaker Notes", options: ["A) Subtitles", "B) Speaker Notes", "C) Textboxes", "D) Hidden Slides"], hint: "These are private notes visible only to the presenter." },
        { q: "You want to create an auto-grading multiple-choice test using Google Forms for your students. What must you do to enable this feature?", a: "B) Click 'Settings' and make it a quiz", options: ["A) Click 'Responses' and print them", "B) Click 'Settings' and make it a quiz", "C) Share it with students as 'Editors'", "D) Use the 'Linear scale' question type"], hint: "You need to change the form settings to turn on grading features." },
        { q: "You shared a Google Sheet containing your class attendance with your teacher as a 'Commenter'. What actions can your teacher perform on this file?", a: "B) View the file and add comments, but not change the data", options: ["A) View the file, edit the attendance, and add comments", "B) View the file and add comments, but not change the data", "C) Only view the file, with no ability to comment", "D) Delete the file from your Google Drive"], hint: "This access level allows feedback without modifying the original content." },
        { q: "You are working on a Google Form and have just formatted a question perfectly. You want to ask a similar question right after it. What is the most efficient way to do this?", a: "B) Click the 'Duplicate' button on the question", options: ["A) Click 'Add question' and re-type everything", "B) Click the 'Duplicate' button on the question", "C) Click 'Import questions'", "D) Create a new form and link it"], hint: "This creates a copy of the existing question instantly." },
        { q: "You need to gather long-form feedback from users, such as 'What is the one thing that can be improved in this course?'. Which Google Forms question type should you use?", a: "B) Paragraph", options: ["A) Short answer", "B) Paragraph", "C) Dropdown", "D) Multiple choice grid"], hint: "This type is for longer, multi-sentence responses." },
        { q: "You want to add a shape and a relevant YouTube video to your Google Slides presentation. Which menu option should you use?", a: "C) Insert", options: ["A) View", "B) Edit", "C) Insert", "D) Format"], hint: "This menu is used to add new media and objects." },
        { q: "While working in Google Sheets, you selected a block of cells that you no longer need and want to remove them completely. What is the correct sequence of actions?", a: "B) Click Edit > Delete and select an option", options: ["A) Click File > Page Setup", "B) Click Edit > Delete and select an option", "C) Click Insert > Cell", "D) Click View > Freeze"], hint: "Deleting cells is handled under the Edit menu." },
        { q: "Which of the following is a primary advantage of using cloud-based Google Apps like Docs, Sheets, and Slides compared to traditional desktop software?", a: "C) They allow users to access files on any device without carrying a flash drive", options: ["A) They require special software installation", "B) They prevent multiple people from working at the same time", "C) They allow users to access files on any device without carrying a flash drive", "D) They do not save changes automatically"], hint: "Cloud storage removes the need for physical storage media." }
    ];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    // Create bubbles
    const bg = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 5 + 's';
        bg.appendChild(b);
    }

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); document.getElementById('intro-screen').classList.remove('hidden'); }, 3000));

    function startQuiz() { document.getElementById('intro-screen').classList.add('hidden'); document.getElementById('quiz-container').classList.remove('hidden'); renderQuestion(); }

    function renderQuestion() {
        clearInterval(timer); attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = ""; document.getElementById('feedback').innerText = "";
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = o; btn.onclick = () => checkAnswer(o); optDiv.appendChild(btn); });
        timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++; document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct'; feedback.innerText = "Correct!";
            correctSound.play(); confetti(); setTimeout(nextQuestion, 1000);
        } else {
            attempts++; wrongSound.play();
            if(attempts < 2) { feedback.className = 'hint-box'; feedback.innerText = "Hint: " + questions[currentQ].hint; }
            else { feedback.className = 'feedback-correct'; feedback.innerText = "Correct answer was: " + questions[currentQ].a; setTimeout(nextQuestion, 2000); }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else { document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer;">Restart Quiz</button>`; }
    }
</script>
</body>
</html>
