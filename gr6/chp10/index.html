<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Quiz - Grade 6 Chapter 10</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #e0eafc, #cfdef3); overflow: hidden; }
        
        /* Bubble Background */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0); } 100% { transform: translateY(-110vh); } }

        /* UI Containers */
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #quiz-container, #intro-screen { background: rgba(255, 255, 255, 0.95); width: 95%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .hidden { display: none !important; }
        .option-btn { border: 2px solid #3498db; border-radius: 10px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: 600; transition: 0.3s; }
        .option-btn:hover { background: #3498db; color: white; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #q-text { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div class="bubble-bg" id="bubbles"></div>

<div id="intro-screen" class="hidden">
    <h1>Quiz on Computer Languages</h1>
    <div style="margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
        <p><strong>Grade:</strong> 6 | <strong>Subject:</strong> ICT</p>
        <p><strong>Topic:</strong>Computer Languages</p> 
        <p><strong>Questions:</strong> 12</p>
    </div>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px;">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="game-area">
        <div id="top-bar" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
    { 
        q: "You wrote a program on an old computer using its native binary code (0s and 1s). When you try to run it on a new computer with a different processor, it doesn't work. What is the main reason for this?", 
        a: "B) Machine language is machine-dependent.", 
        options: ["A) Machine language requires an interpreter.", "B) Machine language is machine-dependent.", "C) Machine language programs take too long to execute.", "D) Machine language uses English-like mnemonics."], 
        hint: "Think about hardware-specific compatibility." 
    },
    { 
        q: "A software developer is writing a program in Python. Upon running the code, the execution stops immediately on line 15 because of a typo, and an error message is displayed. Which type of translator is Python most likely using?", 
        a: "C) Interpreter", 
        options: ["A) Compiler", "B) Assembler", "C) Interpreter", "D) Linker"], 
        hint: "It translates and executes line-by-line." 
    },
    { 
        q: "A gaming company writes a massive software program in C++. Before releasing it to the public, they translate the entire source code into an executable machine language file all at once. What translator did they use?", 
        a: "B) Compiler", 
        options: ["A) Assembler", "B) Compiler", "C) Interpreter", "D) Web Browser"], 
        hint: "It translates the entire source at once." 
    },
    { 
        q: "You are managing a database using SQL. You type a simple query specifying exactly what data you need, without writing the step-by-step logic on how the computer should fetch it. This is a characteristic of which generation of languages?", 
        a: "D) Fourth Generation (4GL)", 
        options: ["A) First Generation (1GL)", "B) Second Generation (2GL)", "C) Third Generation (3GL)", "D) Fourth Generation (4GL)"], 
        hint: "Focuses on 'what' is needed, not 'how'." 
    },
    { 
        q: "A programmer is working with a language that uses short abbreviations or mnemonics like 'ADD A, Y' and 'SUB A, B'. To make the computer hardware understand it, they need a specific translator. Which one?", 
        a: "A) Assembler", 
        options: ["A) Assembler", "B) Compiler", "C) Interpreter", "D) Object Coder"], 
        hint: "Shares its name with the language type." 
    },
    { 
        q: "A research team is developing a decision-making artificial intelligence (AI) system. Which generation of languages are they working with?", 
        a: "D) Fifth Generation Language", 
        options: ["A) Second Generation Language", "B) Third Generation Language", "C) Fourth Generation Language", "D) Fifth Generation Language"], 
        hint: "Designed specifically for AI and human-like logic." 
    },
    { 
        q: "Your school wants to teach a programming language that is easy to learn, uses English-like mathematical phrases, and allows the written program to run on Windows, Mac, and Linux computers. What broad category of language should they choose?", 
        a: "A) High Level Language", 
        options: ["A) High Level Language", "B) Low Level Language", "C) Assembly Language", "D) Machine Language"], 
        hint: "Designed for human readability and portability." 
    },
    { 
        q: "While reading an article about the history of computing algorithms for the Analytical Engine, you learn about the person widely considered to be the first computer programmer. Who is it?", 
        a: "B) Lady Ada Lovelace", 
        options: ["A) Charles Babbage", "B) Lady Ada Lovelace", "C) Bill Gates", "D) Charles Bachman"], 
        hint: "Famous partner to Charles Babbage." 
    },
    { 
        q: "After successfully writing a C++ program, the translator processes your human-readable 'source code' so the computer can execute it. What is the resulting machine-readable code called?", 
        a: "C) Object code", 
        options: ["A) Assembly code", "B) Mnemonic code", "C) Object code", "D) Visual code"], 
        hint: "The final, machine-executable output." 
    },
    { 
        q: "A developer wants to distribute their software as a standalone executable program so no one can see their original code. Why would an interpreter NOT be the best choice?", 
        a: "A) Interpreters do not produce a separate object code file.", 
        options: ["A) Interpreters do not produce a separate object code file.", "B) Interpreters translate all lines of code at once.", "C) Interpreters only work with 1GL languages.", "D) Interpreters are slower than humans at reading code."], 
        hint: "It doesn't create a hidden, standalone file." 
    },
    { 
        q: "You are teaching a beginner how to write instructions using English-like words in a step-by-step manner to tell the computer exactly what to accomplish. This represents which generation?", 
        a: "C) Third Generation (3GL)", 
        options: ["A) First Generation (1GL)", "B) Second Generation (2GL)", "C) Third Generation (3GL)", "D) Fifth Generation (5GL)"], 
        hint: "Procedural languages using English-like syntax." 
    },
    { 
        q: "A computer science student claims that High Level Languages are completely superior because they execute faster than Machine Language. Is this statement correct?", 
        a: "B) No, programs written in machine language take less time for execution.", 
        options: ["A) Yes, High Level Languages execute the fastest.", "B) No, programs written in machine language take less time for execution.", "C) Yes, because they do not require any translators.", "D) No, because High Level Languages are machine-dependent."], 
        hint: "Does a middleman make things faster?" 
    }
];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    // Create bubbles
    const bg = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 5 + 's';
        bg.appendChild(b);
    }

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); document.getElementById('intro-screen').classList.remove('hidden'); }, 3000));

    function startQuiz() { document.getElementById('intro-screen').classList.add('hidden'); document.getElementById('quiz-container').classList.remove('hidden'); renderQuestion(); }

    function renderQuestion() {
        clearInterval(timer); attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = ""; document.getElementById('feedback').innerText = "";
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = o; btn.onclick = () => checkAnswer(o); optDiv.appendChild(btn); });
        timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++; document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct'; feedback.innerText = "Correct!";
            correctSound.play(); confetti(); setTimeout(nextQuestion, 1000);
        } else {
            attempts++; wrongSound.play();
            if(attempts < 2) { feedback.className = 'hint-box'; feedback.innerText = "Hint: " + questions[currentQ].hint; }
            else { feedback.className = 'feedback-correct'; feedback.innerText = "Correct answer was: " + questions[currentQ].a; setTimeout(nextQuestion, 2000); }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else { document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer;">Restart Quiz</button>`; }
    }
</script>
</body>
</html>
