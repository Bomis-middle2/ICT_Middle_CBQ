<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 6 ICT - Chapter 7 Interactive Quiz</title>
    <style>
        :root {
            --primary-color: #2b579a;
            --secondary-color: #e2e9f3;
            --success-color: #2bc474;
            --error-color: #e74c3c;
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --background: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .quiz-container {
            background: white;
            width: 100%;
            max-width: 650px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        /* Splash Screen (Fixed Fail-Safe Display) */
        #splash-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #splash-screen img {
            max-width: 220px;
            height: auto;
            margin-bottom: 20px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid var(--secondary-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Views Layout */
        .view {
            display: none;
            padding: 30px;
            flex-direction: column;
            flex-grow: 1;
        }

        .view.active {
            display: flex;
        }

        /* Header / Controls */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--secondary-color);
            padding: 15px 30px 15px 30px;
            background: #ffffff;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-audio {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        /* Intro Screen */
        .intro-title {
            color: var(--primary-color);
            font-size: 26px;
            margin-bottom: 15px;
            text-align: center;
        }

        .meta-info {
            background: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.6;
        }

        /* Interactive Buttons */
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: auto;
        }

        .btn-primary:hover {
            background-color: #1e3d6b;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .timer-text {
            color: var(--error-color);
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
            white-space: pre-line;
        }

      /* Options layout */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid var(--secondary-color);
            border-radius: 8px;
            padding: 14px 18px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: block;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--secondary-color);
            border-color: #b0c4de;
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        .feedback-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 15px;
            line-height: 1.2;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
            white-space: pre-line;
            width: 100%;
        }
        .feedback-box.hint {
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            color: #856404;
        }

        .feedback-box.explanation {
            background-color: #e2f0d9;
            border-left: 5px solid var(--success-color);
            color: #385723;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5deg); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Results Display */
        .result-score {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            text-align: center;
            margin: 20px 0;
        }

        .result-msg {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            border-radius: 8px;
        }

        #confetti-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="splash-screen">
            <img src="assets/innovine-logo.png" alt="Innovine Logo" id="logo-img">
            <h2 id="logo-placeholder" style="color: var(--primary-color); margin-bottom: 20px; font-weight: bold; tracking-letter: 2px;"></h2>
            <div class="loader"></div>
        </div>

        <canvas id="confetti-canvas"></canvas>

        <div class="quiz-header">
            <div class="score-tracker" id="score-display">Score: 0</div>
            <div class="controls">
                <button class="btn-audio" id="audio-toggle" title="Toggle Sound">🔊</button>
            </div>
        </div>

        <div id="intro-view" class="view active">
            <h1 class="intro-title">Grade 6 ICT — Interactive Practice</h1>
            <div class="meta-info">
                <p><strong>Grade:</strong> 6</p>
                <p><strong>Subject:</strong> ICT</p>
                <p><strong>Topic:</strong> Chapter 7: Making a Movie using OpenShot Video Editor</p>
                <p><strong>Total Questions:</strong> <span id="total-q-count">18</span></p>
            </div>
            <button class="btn-primary" onclick="startQuiz()">Start Practice</button>
        </div>

        <div id="question-view" class="view">
            <div class="question-meta">
                <span id="question-number">Question 1 of 18</span>
                <span class="timer-text">⏱️ <span id="timer-count">45</span>s</span>
            </div>
            <div class="question-text" id="question-text">
                Question content
            </div>
            <div class="options-container" id="options-block">
            </div>
            <div class="feedback-box" id="feedback-block"></div>
            <button class="btn-primary" id="action-btn" style="display:none;" onclick="handleActionClick()">Next</button>
        </div>

        <div id="result-view" class="view">
            <h2 class="intro-title">Practice Completed!</h2>
            <div class="result-score" id="final-score-text">0%</div>
            <div class="result-msg" id="final-message">Feedback placeholder</div>
            <button class="btn-primary" onclick="restartQuiz()">Restart</button>
        </div>
    </div>

    <script>
        const quizData = [
            { "q": "A school librarian finds an old magnetic film tape of a 1990s school play. She cannot play it on her laptop directly. What type of video format is this, and why?", "options": ["Digital video; it needs an MP4 player.", "Analog video; it requires special equipment like a videocassette player.", "Quicktime video; it only works on Apple devices.", "Codec video; it needs decompression."], "correct": 1, "hint": "Think about how old tapes are played compared to modern digital files.", "explanation": "Magnetic tapes are analog, requiring physical playback equipment." },
            { "q": "Rahul downloaded a video file named 'project.avi'. This file acts like a 'digital box' holding video, audio, and subtitles together in a single file structure. What is this file structure formally called?", "options": ["A Codec", "A Keyframe", "A Container format", "A Storyboard"], "correct": 2, "hint": "It acts as a 'digital box'.", "explanation": "Container formats bundle video, audio, and metadata together." },
            { "q": "Meera is compressing her heavy video file so she can email it to her teacher quickly. Which software component is actively responsible for compressing and decompressing the digital media?", "options": ["Container", "Codec (coder/decoder)", "Playhead", "Transition"], "correct": 1, "hint": "It compresses and decompresses data.", "explanation": "A Codec (coder/decoder) compresses and decompresses data." },
            { "q": "Before editing his short film, Aman sketches the scenes on paper, adds timeframes, and writes down the dialogue notes for the actors. What is this pre-planning process called?", "options": ["Exporting", "Slicing", "Storyboarding", "Trimming"], "correct": 2, "hint": "He is sketching scenes on paper.", "explanation": "Storyboarding is the pre-planning stage of drawing scenes." },
            { "q": "A student is looking for a free, open-source video editing software to edit his science project on his Windows laptop. Which of the following is the most suitable?", "options": ["OpenShot Video Editor", "OpenOffice Calc", "MS Paint", "Windows Media Player"], "correct": 0, "hint": "The name of the software used in this chapter.", "explanation": "OpenShot is free, open-source video editing software." },
            { "q": "While editing a birthday video, Riya notices a 5-second mistake in the middle of a clip where the camera fell. Which tool from the Timeline Toolbar should she use to split the clip and remove the mistake?", "options": ["Add Marker tool", "Zoom Slider", "Razor Tool", "Snapping Tool"], "correct": 2, "hint": "Which tool cuts or splits a clip?", "explanation": "The Razor tool is used to cut or split video clips." },
            { "q": "During a long video edit, John wants to remember the exact spot where the music beat drops so he can align an explosion effect to it. Which timeline tool should he use to bookmark this spot?", "options": ["Add Track", "Add Marker", "Previous Marker", "Center Timeline on Playhead"], "correct": 1, "hint": "Which tool acts as a bookmark?", "explanation": "Markers bookmark specific moments on the timeline." },
            { "q": "Priya wants to add a background music track to her video but does not want to mix it with the video's original audio track. How should she arrange this in OpenShot?", "options": ["Place the music and video on the exact same layer.", "Place the music on a separate track (e.g., the bottom track) in the timeline.", "She must delete the video's audio first before adding music.", "Music cannot be added in OpenShot."], "correct": 1, "hint": "Using different tracks keeps audio independent.", "explanation": "Separate tracks allow independent control of audio/video." },
            { "q": "The teacher explains that OpenShot layers videos using tracks. If there are media clips placed on three different tracks (Top, Middle, Bottom), which track's clips will always be visible on top of the others?", "options": ["Bottom Track", "Middle Track", "Top Track", "They will all blend equally automatically."], "correct": 2, "hint": "Which layer is on top?", "explanation": "Tracks are layered; the top track displays over others." },
            { "q": "Sarah's video jumps abruptly from an indoor scene to an outdoor scene. What should she add between the two clips to make the shift smoother?", "options": ["A Keyframe", "A Transition (like fade or slide)", "A Filter", "A Codec"], "correct": 1, "hint": "What effect makes a scene shift smoother?", "explanation": "Transitions make scene shifts smoother and less abrupt." },
            { "q": "Rohan wants his new video to look like an old 1950s movie by changing the color to black and white. Which feature should he apply to the clip?", "options": ["Visual Effects (Grayscale)", "Transitions", "Animate Menu", "Razor Tool"], "correct": 0, "hint": "Which feature changes the visual color/style?", "explanation": "Visual effects allow color adjustment, such as grayscale." },
            { "q": "A student wants a text title to slowly move from the left side of the screen to the right side over a period of 3 seconds. What special markers does she need to use to create this animation over time?", "options": ["Razor tools", "Transitions", "Playheads", "Keyframes"], "correct": 3, "hint": "What marks change over time?", "explanation": "Keyframes define start/end points for animations." },
            { "q": "What is the absolute minimum number of keyframes required to create any animation or movement effect in OpenShot?", "options": ["One", "Two", "Three", "Zero"], "correct": 1, "hint": "You need a start and an end point.", "explanation": "Two keyframes are needed to define an animation path." },
            { "q": "Kiran has finished adding all clips, titles, and effects in OpenShot. She wants to play the final video on her living room TV using a pen drive. What must she do to convert the workspace project into a real playable video file (like .mp4)?", "options": ["Click 'Save Project As'", "Click 'Export Video'", "Click 'Import Files'", "Click 'Add Track'"], "correct": 1, "hint": "Which action creates the final file?", "explanation": "Exporting is required to create a standard playable video." },
            { "q": "Aman clicked 'Save Project As' after an hour of editing and saved a file on his desktop. What exactly does this saved project file contain?", "options": ["A fully rendered MP4 video ready for playback.", "Only the audio files without the video.", "The structure of the editing work and references to the media locations, not the actual media itself.", "A single flattened image of his work."], "correct": 2, "hint": "It's just the 'recipe' for the edit.", "explanation": "A project file stores edit instructions, not the media." },
            { "q": "While editing, Neha wants to see exactly how her final video will look with all the current edits and effects applied. Which panel in the OpenShot window should she watch?", "options": ["Project Files panel", "Function Tabs", "Video Preview Window", "Timeline Toolbar"], "correct": 2, "hint": "Which window shows the final result?", "explanation": "The Preview window shows the final output during editing." },
            { "q": "A user wants to insert a short text explaining a scene that will appear directly on top of the playing video. What is this short text called?", "options": ["Title", "Caption", "Keyframe", "Effect"], "correct": 1, "hint": "It is a short text label.", "explanation": "A caption is text placed on a video to explain a scene." },
            { "q": "While moving back and forth on the timeline, what does the Playhead (the red line on the ruler) indicate?", "options": ["The end of the video.", "The current playback position in the video project.", "The volume of the audio.", "The location of a split clip."], "correct": 1, "hint": "It shows where you are currently looking.", "explanation": "The Playhead marks the current frame being viewed." }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let attemptsLeft = 2;
        let timerInterval = null;
        let timeRemaining = 45;
        let audioMuted = false;

        const audioCorrect = new Audio('assets/correct.mp3');
        const audioWrong = new Audio('assets/wrong.mp3');

        const splashScreen = document.getElementById('splash-screen');
        const logoImage = document.getElementById('logo-img');
        const logoPlaceholder = document.getElementById('logo-placeholder');
        const introView = document.getElementById('intro-view');
        const questionView = document.getElementById('question-view');
        const resultView = document.getElementById('result-view');
        const scoreDisplay = document.getElementById('score-display');
        const audioToggle = document.getElementById('audio-toggle');
        const totalQCountSpan = document.getElementById('total-q-count');

        logoImage.onerror = () => { logoImage.style.display = 'none'; logoPlaceholder.style.display = 'block'; };

        window.addEventListener('load', () => {
            totalQCountSpan.textContent = quizData.length;
            setTimeout(() => { splashScreen.style.opacity = '0'; setTimeout(() => splashScreen.style.display = 'none', 500); }, 5000);
        });

        audioToggle.addEventListener('click', () => { audioMuted = !audioMuted; audioToggle.textContent = audioMuted ? "❌" : "🔊"; });

        function playSound(audioObject) { if (!audioMuted) { audioObject.currentTime = 0; audioObject.play().catch(e => {}); } }

        function startQuiz() {
            introView.classList.remove('active');
            questionView.classList.add('active');
            currentQuestionIndex = 0;
            score = 0;
            updateScoreDisplay();
            loadQuestion();
        }

        function updateScoreDisplay() { scoreDisplay.textContent = `Score: ${score}`; }

        function loadQuestion() {
            clearInterval(timerInterval);
            attemptsLeft = 2;
            timeRemaining = 45;
            const qData = quizData[currentQuestionIndex];
            document.getElementById('question-number').textContent = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
            document.getElementById('question-text').textContent = qData.q;
            document.getElementById('timer-count').textContent = timeRemaining;
            const feedbackBlock = document.getElementById('feedback-block');
            feedbackBlock.style.display = 'none';
            document.getElementById('action-btn').style.display = 'none';
            const optionsBlock = document.getElementById('options-block');
            optionsBlock.innerHTML = '';
            qData.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => submitAnswer(index, btn);
                optionsBlock.appendChild(btn);
            });
            timerInterval = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer-count').textContent = timeRemaining;
                if (timeRemaining <= 0) { clearInterval(timerInterval); forceTimeoutReveal(); }
            }, 1000);
        }

        function submitAnswer(selectedIndex, clickedBtn) {
            const qData = quizData[currentQuestionIndex];
            const optionsBlock = document.getElementById('options-block');
            const feedbackBlock = document.getElementById('feedback-block');
            if (selectedIndex === qData.correct) {
                clearInterval(timerInterval);
                playSound(audioCorrect);
                triggerSparklers();
                clickedBtn.classList.add('correct');
                score += (attemptsLeft === 2 ? 10 : 5);
                updateScoreDisplay();
                Array.from(optionsBlock.children).forEach(btn => btn.disabled = true);
                feedbackBlock.innerText = `✨ Correct!: ${qData.explanation}`;
                feedbackBlock.className = 'feedback-box explanation';
                feedbackBlock.style.display = 'block';
                showNextActionControl();
            } else {
                attemptsLeft--;
                clickedBtn.classList.add('wrong');
                clickedBtn.disabled = true;
                playSound(audioWrong);
                if (attemptsLeft === 1) {
                    feedbackBlock.innerText = `💡 Try Again! Hint: ${qData.hint}`;
                    feedbackBlock.className = 'feedback-box hint';
                    feedbackBlock.style.display = 'block';
                } else {
                    clearInterval(timerInterval);
                    Array.from(optionsBlock.children).forEach(btn => btn.disabled = true);
                    optionsBlock.children[qData.correct].classList.add('correct');
                    feedbackBlock.innerText = `Learning Review: ${qData.explanation}`;
                    feedbackBlock.className = 'feedback-box explanation';
                    feedbackBlock.style.display = 'block';
                    showNextActionControl();
                }
            }
        }

        function forceTimeoutReveal() {
            const qData = quizData[currentQuestionIndex];
            const optionsBlock = document.getElementById('options-block');
            const feedbackBlock = document.getElementById('feedback-block');
            Array.from(optionsBlock.children).forEach(btn => btn.disabled = true);
            optionsBlock.children[qData.correct].classList.add('correct');
            feedbackBlock.innerText = `⏳Time's Up! Let's review the solution:${qData.explanation}`;
            feedbackBlock.className = 'feedback-box explanation';
            feedbackBlock.style.display = 'block';
            playSound(audioWrong);
            showNextActionControl();
        }

        function showNextActionControl() {
            const actionBtn = document.getElementById('action-btn');
            actionBtn.style.display = 'block';
            actionBtn.textContent = (currentQuestionIndex === quizData.length - 1) ? "View Results" : "Next Question";
        }

        function handleActionClick() {
            if (currentQuestionIndex < quizData.length - 1) { currentQuestionIndex++; loadQuestion(); } else { displayFinalScoreCard(); }
        }

        function displayFinalScoreCard() {
            questionView.classList.remove('active');
            resultView.classList.add('active');
            const percentageScored = Math.round((score / (quizData.length * 10)) * 100);
            document.getElementById('final-score-text').textContent = `${percentageScored}%`;
            const msgBlock = document.getElementById('final-message');
            if (percentageScored >= 75) { msgBlock.textContent = "Good job! You have mastered this chapter."; msgBlock.style.backgroundColor = "#d4edda"; msgBlock.style.color = "#155724"; triggerSparklers(); }
            else if (percentageScored >= 40) { msgBlock.textContent = "Review this chapter and try again."; msgBlock.style.backgroundColor = "#fff3cd"; msgBlock.style.color = "#856404"; }
            else { msgBlock.textContent = "Let's practise more. Go through the core concepts again."; msgBlock.style.backgroundColor = "#f8d7da"; msgBlock.style.color = "#721c24"; }
        }

        function restartQuiz() { resultView.classList.remove('active'); startQuiz(); }

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resizeCanvas);
        function triggerSparklers() {
            resizeCanvas();
            for (let i = 0; i < 60; i++) {
                particles.push({ x: canvas.width / 2, y: canvas.height / 2 - 50, radius: Math.random() * 4 + 2, color: `hsl(${Math.random() * 360}, 80%, 60%)`, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8 - 3, alpha: 1, decay: Math.random() * 0.015 + 0.015 });
            }
            if(particles.length <= 60) requestAnimationFrame(renderParticles);
        }
        function renderParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.alpha -= p.decay;
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
                if (p.alpha <= 0) particles.splice(idx, 1);
            });
            if (particles.length > 0) requestAnimationFrame(renderParticles);
        }
    </script>
</body>
</html>
