<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Citizenship Quiz - Grade 7</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            overflow: hidden;
        }
        
        /* Animated Bubble Background */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.3); border-radius: 50%; animation: rise 15s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translateY(-110vh); opacity: 0; } }

        /* UI Containers */
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #quiz-container, #intro-screen { 
            background: rgba(255, 255, 255, 0.95); 
            width: 90%; max-width: 600px; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center;
            box-sizing: border-box;
        }
        
        .hidden { display: none !important; }
        .option-btn { border: 2px solid #3498db; border-radius: 10px; padding: 12px; margin: 8px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: 600; transition: 0.3s; font-size: 1rem; }
        .option-btn:hover { background: #3498db; color: white; }
        .hint-box { background: #fff3cd; padding: 10px; border-radius: 8px; margin-top: 15px; color: #856404; font-weight: bold; font-size: 0.9rem; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #q-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>
<div class="bubble-bg" id="bubbles"></div>

<div id="intro-screen" class="hidden">
    <h1>Digital Citizenship Quiz</h1>
    <div style="margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
        <p><strong>Grade: </strong> 7</p>
<p><strong>Subject: </strong>ICT</p>

        <p><strong>Topic: </strong>Digital Citizenship</p>
	<p><strong>No. of Questions: </strong>10</p>
    </div>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px;">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="game-area">
        <div id="top-bar" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "Aryan is working on a school project. He finds a great paragraph on a website, copies it exactly into his report, but forgets to mention the website or the author. This unethical practice is known as:", a: "B. Plagiarism", options: ["A. Hacking", "B. Plagiarism", "C. Digital Piracy", "D. Identity Theft"], hint: "Think about the consequences of presenting someone else's original ideas as your own." },
        { q: "Sneha receives a link from an unknown person claiming she won a prize. Before clicking, she remembers the 'THINK' rule. The 'K' in THINK stands for:", a: "B. Kind", options: ["A. Known", "B. Kind", "C. Knowledgeable", "D. Keyed"], hint: "Reflect on the final letter of the acronym often used for positive online interaction." },
        { q: "A professional is hired by a bank to find weaknesses in their computer system so they can fix them before real criminals find them. This person is a:", a: "C. White Hat Hacker", options: ["A. Black Hat Hacker", "B. Grey Hat Hacker", "C. White Hat Hacker", "D. Identity Thief"], hint: "Consider the color often associated with goodness and ethical intent in digital contexts." },
        { q: "Raj likes a new movie but doesn't want to pay for it. He finds a website where he can download a 'cracked' version for free. By doing this, Raj is engaging in:", a: "A. Digital Piracy", options: ["A. Digital Piracy", "B. Cyberbullying", "C. Phishing", "D. Intellectual Property Rights"], hint: "This term refers to the unauthorized sharing or acquisition of creative works." },
        { q: "Which digital right ensures that every student, regardless of where they live, can learn how to use technology safely and effectively?", a: "B. Right to Digital Education", options: ["A. Right to Privacy", "B. Right to Digital Education", "C. Right to Express Opinions", "D. Right to Access Information"], hint: "Focus on the right specifically related to training and learning about digital tools." },
        { q: "A stranger creates a social media profile using your name and photos to trick your friends into sending money. This cybercrime is called:", a: "B. Identity Theft", options: ["A. Hacking", "B. Identity Theft", "C. Invasion of Privacy", "D. Plagiarism"], hint: "This occurs when someone assumes your persona to cause harm or gain unfair advantages." },
        { q: "Every time you like a video or post a comment online, you leave a trail of information that can be seen by others. This is known as your:", a: "C. Digital Footprint", options: ["A. Digital ID", "B. Browsing History", "C. Digital Footprint", "D. Online Identity"], hint: "Imagine walking in mud; what do you leave behind that tracks your path?" },
        { q: "You visit a website and it asks you to accept a file that helps the site 'remember' your preferences. This file is called a:", a: "B. Cookie", options: ["A. Virus", "B. Cookie", "C. Malware", "D. Search Engine"], hint: "Think of a small snack item that sounds similar to this digital tracking tool." },
        { q: "A company develops a unique logo for their product. To prevent others from using this exact logo, what type of Intellectual Property Right should they use?", a: "C. Trademark", options: ["A. Copyright", "B. Patent", "C. Trademark", "D. Trade Secret"], hint: "Consider the protection used for brand identity elements." },
        { 
    q: "A school wants to create a digital directory of students, including their names, home addresses, and phone numbers, to share with a private tutoring service. How does the Digital Personal Data Protection Act (DPDA) 2023 likely view this action?", 
    a: "C. It requires clear consent from the individuals (or their guardians) for the specific purpose of sharing data.", 
    options: [
        "A. It is permitted because schools own all student data.", 
        "B. It is permitted as long as the data is saved in a text file.", 
        "C. It requires clear consent from the individuals (or their guardians) for the specific purpose of sharing data.", 
        "D. It is only prohibited if the tutoring service is located outside of India."
    ], 
    hint: "Think about the fundamental right of an individual to control who has access to their private information and the importance of authorization before sharing it with a third party." 
}
    ];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    // Create bubbles
    const bg = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 10 + 's';
        bg.appendChild(b);
    }

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); document.getElementById('intro-screen').classList.remove('hidden'); }, 2000));

    function startQuiz() { document.getElementById('intro-screen').classList.add('hidden'); document.getElementById('quiz-container').classList.remove('hidden'); renderQuestion(); }

    function renderQuestion() {
        clearInterval(timer); attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = ""; document.getElementById('feedback').innerText = "";
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = o; btn.onclick = () => checkAnswer(o); optDiv.appendChild(btn); });
        timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++; document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct'; feedback.innerText = "Correct!";
            correctSound.play(); confetti(); setTimeout(nextQuestion, 1000);
        } else {
            attempts++; wrongSound.play();
            if(attempts < 2) { feedback.className = 'hint-box'; feedback.innerText = "Hint: " + questions[currentQ].hint; }
            else { feedback.className = 'feedback-correct'; feedback.innerText = "Correct: " + questions[currentQ].a; setTimeout(nextQuestion, 2000); }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else { document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer; margin-top:20px;">Restart Quiz</button>`; }
    }
</script>
</body>
</html>
