<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to C - Interactive Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #quiz-container { background: white; width: 95%; max-width: 600px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        .option-btn { border: 2px solid blue; border-radius: 15px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: bold; font-family: inherit; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #logo-screen, #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .hidden { display: none !important; }
        #q-text { font-weight: bold; font-size: 1.0rem; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div id="intro-screen" class="hidden">
    <h1>Introduction to C</h1>
    <p><strong>Grade:</strong> 6</p>
    <p><strong>Subject:</strong> ICT</p>
    <p><strong>Topic:</strong> Chapter 11 Scenario CBQs</p>
    <p><strong>No. of Questions:</strong> 15</p>
    <button onclick="startQuiz()" style="padding: 15px 30px; font-size: 18px; font-family: inherit; cursor: pointer;">Start Quiz</button>
</div>

<div id="quiz-container">
    <div id="game-area" class="hidden">
        <div id="top-bar">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
        {
            q: "A student is creating a student grading system and needs to declare a variable to store the student's first name. According to the rules of C, which of the following is a valid variable name?",
            a: "first_name",
            options: ["1st_name", "first name", "first_name", "char"],
            hint: "Variables cannot start with numbers, contain spaces, or use reserved keywords."
        },
        {
            q: "A developer finishes writing the source code for a new C application. After compiling, which specific tool is responsible for combining different object files and library files to produce the final executable (.exe) file?",
            a: "Linker",
            options: ["Preprocessor", "Compiler", "Linker", "Interpreter"],
            hint: "This tool connects scattered fragments into a unified executable package."
        },
        {
            q: "You are building a weather application that reads temperature from a sensor. The temperature needs to be stored with decimal places (e.g., 36.55). If memory is constrained and you only have 4 bytes available for this variable, which data type should you use?",
            a: "float",
            options: ["int", "float", "double", "char"],
            hint: "This single-precision type captures fractional values using exactly 4 bytes of storage."
        },
        {
            q: "In a physics simulation program, you need to use the value of Pi (3.14159). To ensure this value is strictly protected and cannot be modified by other parts of the program during execution, how should it be defined?",
            a: "As a constant",
            options: ["As a standard float variable", "As a constant", "As an integer", "As a keyword"],
            hint: "Using keywords like 'const' locks the assigned literal to guard against runtime mutations."
        },
        {
            q: "A banking app is designed to deposit money into an account. However, due to a typo, the programmer used a minus sign (-) instead of a plus sign (+). The code compiles and runs without crashing, but the balances are wrong. What type of error is this?",
            a: "Logical Error",
            options: ["Syntax Error", "Logical Error", "Runtime Error", "Compilation Error"],
            hint: "The environment runs smoothly, but the math formulas yield broken outputs."
        },
        {
            q: "A user is writing a program and forgets to put a semicolon (;) at the end of a variable declaration line. When they try to build the program, the compiler refuses to compile it. What type of error did the programmer make?",
            a: "Syntax Error",
            options: ["Logical Error", "Linker Error", "Syntax Error", "Runtime Error"],
            hint: "This is a direct violation of the foundational grammatical writing rules of C."
        },
        {
            q: "A developer is writing a program in C and includes a header file using `#include <stdio.h>`. Which phase of the compilation process scans for this symbol and grabs the file contents before the core compilation begins?",
            a: "Preprocessor",
            options: ["Linker", "Assembler", "Preprocessor", "Output Generator"],
            hint: "Commands starting with '#' are sorted out during this structural initialization step."
        },
        {
            q: "A software application takes two integers, `A = 15` and `B = 4`. The programmer uses the modulus operator (`%`) in the statement: `result = A % B;`. What value is stored in the result variable?",
            a: "3",
            options: ["3.75", "3", "1", "0"],
            hint: "This specific operator drops the quotient and extracts only the arithmetic remainder."
        },
        {
            q: "A game engine monitors user coordinates. A character moves and the system processes the operation `score = score + 5;`. Which shorthand assignment operator writes this expression more compactly?",
            a: "score += 5;",
            options: ["score =+ 5;", "score == 5;", "score +:= 5;", "score += 5;"],
            hint: "Combine the target math symbol with the standard assignment equality marker."
        },
        {
            q: "You are setting up a validation filter where a user is allowed entry only if their input passcode matches the system master password exactly. Which relational operator checks for absolute equality in C?",
            a: "==",
            options: ["=", "==", "===", "!="],
            hint: "Avoid single assignment signs; look for the double identity comparison indicator."
        },
        {
            q: "You are writing a web verification program to check if a user is eligible for a teen discount. Their age must be greater than 12 AND less than 20. Which logical operator must be used to combine these two conditions?",
            a: "&&",
            options: ["||", "!=", "&&", "=="],
            hint: "This operator demands that both neighboring conditional checks evaluate as true."
        },
        {
            q: "A programmer attempts to create a variable to hold the interest rate and names it `double`. The compiler immediately throws an error. Why is this variable name invalid?",
            a: "'double' is a reserved keyword in C.",
            options: [
                "It exceeds 31 characters.",
                "It contains a special symbol.",
                "'double' is a reserved keyword in C.",
                "It does not start with an underscore."
            ],
            hint: "You cannot assign system terminology earmarked for foundational types as names."
        },
        {
            q: "You are reviewing a large C program consisting of multiple functions. To trace the flow of the program, you need to know where the execution begins. Which mandatory function should you look for?",
            a: "main()",
            options: ["start()", "printf()", "include()", "main()"],
            hint: "Every standard execution engine enters a C program structure through this single primary node."
        },
        {
            q: "In a ticketing queue system, the current ticket number is 10 (`ticket = 10;`). The system uses the pre-increment operator to assign the next ticket: `next_ticket = ++ticket;`. What is the value assigned to `next_ticket`?",
            a: "11",
            options: ["10", "11", "9", "12"],
            hint: "The variable increases immediately *before* the value is transferred over."
        },
        {
            q: "While debugging, you want to temporarily disable a block of 5 lines of code without deleting them. Which symbols should you use to enclose these lines?",
            a: "/* and */",
            options: ["// and //", "/* and */", "{ and }", "# and #"],
            hint: "Double slashes work for single lines, but block comments span multiple rows cleanly."
        }
    ];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;

    window.addEventListener('load', () => setTimeout(() => {
        document.getElementById('logo-screen').classList.add('hidden');
        document.getElementById('intro-screen').classList.remove('hidden');
    }, 5000));

    function startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        clearInterval(timer);
        attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = "";
        document.getElementById('feedback').innerText = "";
        
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = o;
            btn.onclick = () => checkAnswer(o);
            optDiv.appendChild(btn);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++;
            document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct';
            feedback.innerText = "Correct!";
            setTimeout(nextQuestion, 1000);
        } else {
            attempts++;
            if(attempts < 2) {
                feedback.className = 'hint-box';
                feedback.innerText = "Hint: " + questions[currentQ].hint;
            } else {
                feedback.className = 'feedback-correct';
                feedback.innerText = "Correct answer was: " + questions[currentQ].a;
                setTimeout(nextQuestion, 2000);
            }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else {
            document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()">Restart Quiz</button>`;
        }
    }
</script>
</body>
</html>
