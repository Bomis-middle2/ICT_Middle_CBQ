<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Quiz - Grade 6 SBL Chapter 1</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #e0eafc, #cfdef3); overflow: hidden; }
        
        /* Bubble Background */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0); } 100% { transform: translateY(-110vh); } }

        /* UI Containers */
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #quiz-container, #intro-screen { background: rgba(255, 255, 255, 0.95); width: 95%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .hidden { display: none !important; }
        .option-btn { border: 2px solid #3498db; border-radius: 10px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: 600; transition: 0.3s; }
        .option-btn:hover { background: #3498db; color: white; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #q-text { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div class="bubble-bg" id="bubbles"></div>

<div id="intro-screen" class="hidden">
    <h1>Basics of a Circuit and Breadboard Quiz</h1>
    <div style="margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
        <p><strong>Grade:</strong> 6 | <strong>Subject:</strong> ICT</p>
<p><strong>Chapter:</strong>Stem-Based Learning Chapter 1</p>
        <p><strong>Topic:</strong> Basics of a Circuit and Breadboard</p> 
        <p><strong>Questions:</strong> 15</p>
    </div>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px;">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="game-area">
        <div id="top-bar" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
    { q: "You are setting up a battery for a remote-controlled car. In which direction does the current flow according to circuit fundamentals?", a: "B) From the positive to the negative terminal of the battery", options: ["A) From the negative to the positive terminal of the battery", "B) From the positive to the negative terminal of the battery", "C) In both directions simultaneously", "D) From the resistor to the capacitor"], hint: "Consider the conventional direction of current flow in a standard circuit." },
    { q: "Your science project requires a 3A current to flow through a circuit powered by a 12V battery. According to Ohm's Law, how much resistance is needed?", a: "C) 4 Ohms", options: ["A) 36 Ohms", "B) 15 Ohms", "C) 4 Ohms", "D) 9 Ohms"], hint: "Recall Ohm's Law: Resistance = Voltage / Current (R = V/I)." },
    { q: "You are building an LED flashlight and need to ensure the electricity flows only in one specific direction. Which component should you use?", a: "A) Diode", options: ["A) Diode", "B) Resistor", "C) Capacitor", "D) Inductor"], hint: "This component acts like a one-way street for electric current." },
    { q: "A technician needs to store energy temporarily in the form of an electric charge for an AC circuit. Which component should they select?", a: "D) Capacitor", options: ["A) Battery", "B) Resistor", "C) Inductor", "D) Capacitor"], hint: "Think of the component designed to store and release electrical energy." },
    { q: "You notice that if one single bulb burns out in a string of lights, the entire string goes dark. What type of circuit is this?", a: "B) Series circuit", options: ["A) Parallel circuit", "B) Series circuit", "C) Short circuit", "D) Open circuit"], hint: "In this circuit, there is only one path for the electricity to follow." },
    { q: "What type of circuit allows you to turn off a bedroom fan without turning off the room lights?", a: "A) Parallel circuit", options: ["A) Parallel circuit", "B) Series circuit", "C) Closed circuit", "D) Short circuit"], hint: "This configuration provides multiple independent paths for current." },
    { q: "Two bare wires accidentally touch each other, creating a low-resistance path that causes a dangerous spark. What is this condition?", a: "C) Short circuit", options: ["A) Open circuit", "B) Closed circuit", "C) Short circuit", "D) Series circuit"], hint: "This happens when current bypasses the intended path through a low-resistance connection." },
    { q: "Which parameter provides the pushing force needed to drive mobile electrons through a closed circuit?", a: "B) Voltage (Volts)", options: ["A) Current (Amperes)", "B) Voltage (Volts)", "C) Resistance (Ohms)", "D) Inductance (Henries)"], hint: "Think of this as the electrical pressure provided by a power source." },
    { q: "An engineer wants to test an early model of a smart alarm system without permanently soldering the components. Which tool should they use?", a: "B) Breadboard", options: ["A) Printed Circuit Board (PCB)", "B) Breadboard", "C) Transistor", "D) Insulated wire coil"], hint: "This board allows for temporary prototyping of circuits." },
    { q: "Which specific part of a breadboard is designed for power supply connections and is marked with '+' and '-' signs?", a: "C) Power Rails", options: ["A) Terminal Strips", "B) DIP Support", "C) Power Rails", "D) Row Markings"], hint: "These are usually the long strips running along the sides of the breadboard." },
    { q: "What is the groove running down the middle of a breadboard, used to divide it into two equal parts, called?", a: "C) DIP (Dual In-line Package) Support", options: ["A) Power Rail", "B) Terminal Strip", "C) DIP (Dual In-line Package) Support", "D) Row gap"], hint: "It is designed to support the placement of integrated circuit chips." },
    { q: "You are building an audio amplifier and need a semiconductor device to amplify weak electrical signals. Which component is most suitable?", a: "B) Transistor", options: ["A) Capacitor", "B) Transistor", "C) Inductor", "D) Resistor"], hint: "This component is commonly used as an electronic switch or amplifier." },
    { q: "What is the measure of opposition to the flow of current in a circuit called?", a: "C) Resistance", options: ["A) Voltage", "B) Capacitance", "C) Resistance", "D) Current"], hint: "This is what causes a light bulb to dim if added to a circuit." },
    { q: "A teacher instructs you to place a jumper wire in hole 'c12' on the breadboard. What do 'c' and '12' represent?", a: "B) Column 'c' and Row '12'", options: ["A) Component 'c' and wire '12'", "B) Column 'c' and Row '12'", "C) Circuit 'c' and Voltage '12'", "D) Current 'c' and Resistance '12'"], hint: "Breadboards are organized in a grid-like coordinate system." },
    { q: "You need a component that consists of an insulated wire wound into a coil to store energy in the form of a magnetic field. What should you use?", a: "D) Inductor", options: ["A) Capacitor", "B) Resistor", "C) Diode", "D) Inductor"], hint: "This component is identified by its coiled wire structure." }
];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    // Create bubbles
    const bg = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 5 + 's';
        bg.appendChild(b);
    }

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); document.getElementById('intro-screen').classList.remove('hidden'); }, 3000));

    function startQuiz() { document.getElementById('intro-screen').classList.add('hidden'); document.getElementById('quiz-container').classList.remove('hidden'); renderQuestion(); }

    function renderQuestion() {
        clearInterval(timer); attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = ""; document.getElementById('feedback').innerText = "";
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = o; btn.onclick = () => checkAnswer(o); optDiv.appendChild(btn); });
        timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++; document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct'; feedback.innerText = "Correct!";
            correctSound.play(); confetti(); setTimeout(nextQuestion, 1000);
        } else {
            attempts++; wrongSound.play();
            if(attempts < 2) { feedback.className = 'hint-box'; feedback.innerText = "Hint: " + questions[currentQ].hint; }
            else { feedback.className = 'feedback-correct'; feedback.innerText = "Correct answer was: " + questions[currentQ].a; setTimeout(nextQuestion, 2000); }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else { document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer;">Restart Quiz</button>`; }
    }
</script>
</body>
</html>
