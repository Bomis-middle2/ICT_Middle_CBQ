<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advance Features of Scratch - Grade 5</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            overflow: hidden;
        }
        
        /* Animated Bubble Background */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.3); border-radius: 50%; animation: rise 15s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translateY(-110vh); opacity: 0; } }

        /* UI Containers */
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #quiz-container, #intro-screen { 
            background: rgba(255, 255, 255, 0.95); 
            width: 90%; max-width: 600px; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center;
            box-sizing: border-box;
        }
        
        .hidden { display: none !important; }
        .option-btn { border: 2px solid #3498db; border-radius: 10px; padding: 12px; margin: 8px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: 600; transition: 0.3s; font-size: 1rem; }
        .option-btn:hover { background: #3498db; color: white; }
        .hint-box { background: #fff3cd; padding: 10px; border-radius: 8px; margin-top: 15px; color: #856404; font-weight: bold; font-size: 0.9rem; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #q-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>
<div class="bubble-bg" id="bubbles"></div>

<div id="intro-screen" class="hidden">
    <h1>Advance Features of Scratch</h1>
    <div style="margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
        <p><strong>Grade: </strong> 5</p>
<p><strong>Subject: </strong>ICT</p>

        <p><strong>Topic: </strong>Advance Features of Scratch</p>
	<p><strong>No. of Questions: </strong>12</p>
    </div>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px;">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="game-area">
        <div id="top-bar" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
   const questions = [
    { 
        q: "Seema wants to create a game where she tracks how many times a user clicks a balloon. Which element should she create first to store the click count?", 
        a: "A. A Variable", 
        options: ["A. A Variable", "B. A Sprite", "C. A Script", "D. A Stage"], 
        hint: "Think about which element is used to store data or numbers in a program." 
    },
    { 
        q: "A student writes a script to change the size of a sprite. They use the 'set size' block and want the sprite to become smaller. Which value should they enter?", 
        a: "B. A value smaller than the current size", 
        options: ["A. A value larger than the current size", "B. A value smaller than the current size", "C. The same value as the current size", "D. A negative value only"], 
        hint: "If the current size is 100%, consider what percentage would result in a physically smaller object." 
    },
    { 
        q: "Imagine a screenshot of the Scratch interface with the 'Scripts Area' highlighted. Which description correctly defines this area?", 
        a: "C. Where you drag instruction blocks to create a program", 
        options: ["A. Where you see the sprite in action", "B. Where you select the background ", "C. Where you drag instruction blocks to create a program", "D. Where you see the list of all sprites"], 
        hint: "This is the main workspace where you assemble your code." 
    },
    { 
        q: "You are coding a game. You want to ask the user for their name and then make the sprite say it. If the user types 'Sam', where does Scratch store this text?", 
        a: "B. In the 'answer' variable", 
        options: ["A. In the Scripts Area", "B. In the 'answer' variable", "C. In the Blocks Area", "D. In the Sprite List"], 
        hint: "When you use the 'ask and wait' block, the input is captured in a specific storage block." 
    },
    { 
        q: "Assertion: Variables are not necessary in a Scratch game that tracks scores. <br> Reason: A variable acts like a container that can store different values at different times.", 
        a: "D. Assertion is false, but Reason is true.", 
        options: ["A. Both Assertion and Reason are true, and Reason is the correct explanation.", "B. Both Assertion and Reason are true, but Reason is not the correct explanation.", "C. Assertion is true, but Reason is false.", "D. Assertion is false, but Reason is true."], 
        hint: "Recall the purpose of a variable as a storage container." 
    },
    { 
        q: "Vineet is making a game where clicking a red crab adds 10 to the score. What is the correct initial value for the score variable when the game starts?", 
        a: "C. 0", 
        options: ["A. 10", "B. 100", "C. 0", "D. -10"], 
        hint: "What should the score be before the player has earned any points?" 
    },
    { 
        q: "Which of the following is NOT a button used to select a sprite in the Sprite List?", 
        a: "D. Set size of Sprite", 
        options: ["A. Paint new Sprite", "B. Choose Sprite from library", "C. Upload Sprite from file", "D. Set size of Sprite"], 
        hint: "Look for the option that is a property or action, rather than a way to add a character." 
    },
    { 
        q: "Anita wants to ask the user, 'What is your favorite color?' and then display that color on the stage. Which sequence is correct?", 
        a: "A. Use 'ask and wait' block, then check 'answer' checkbox", 
        options: ["A. Use 'ask and wait' block, then check 'answer' checkbox", "B. Use 'set size' block, then check 'answer' checkbox", "C. Use 'say' block, then delete the sprite", "D. Use 'change size' block, then use 'ask and wait'"], 
        hint: "You need to trigger the prompt for input and then access that captured information." 
    },
    { 
        q: "You want to animate a sprite to make it look like it is growing slowly. Which blocks are most suitable for this?", 
        a: "B. 'change size' block inside a loop", 
        options: ["A. 'ask and wait' and 'set size'", "B. 'change size' block inside a loop", "C. 'set size' block only", "D. 'delete sprite' block"], 
        hint: "A loop allows you to repeat an action to create a gradual effect." 
    },
    { 
        q: "You have two sprites on the stage. You want to write a script specifically for the first sprite. How do you ensure the script applies only to it?", 
        a: "A. Click the Sprite in the Sprite List first, then write the script", 
        options: ["A. Click the Sprite in the Sprite List first, then write the script", "B. Click the Stage first, then write the script", "C. Write the script in the Blocks Area", "D. Delete the other sprite before writing the script"], 
        hint: "In Scratch, scripts are always attached to the currently selected object." 
    },
    { 
        q: "A student wants to decrease the score by 10 when a yellow crab is clicked. Which block logic is correct?", 
        a: "C. Change score by -10", 
        options: ["A. Set score to 10", "B. Change score by 10", "C. Change score by -10", "D. Set score to 0"], 
        hint: "To decrease a value using the 'change' block, you must use a negative number." 
    },
    { 
        q: "A Scratch game uses a variable to store the 'High Score'. If the game is played three times with scores 20, 50, and 30, what value does the variable hold after the final game if the script updates it every time?", 
        a: "B. 30", 
        options: ["A. 20", "B. 30", "C. 50", "D. 100"], 
        hint: "Consider the sequence of events: the final game score will overwrite the previous value." 
    }
];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    // Create bubbles
    const bg = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 10 + 's';
        bg.appendChild(b);
    }

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); document.getElementById('intro-screen').classList.remove('hidden'); }, 2000));

    function startQuiz() { document.getElementById('intro-screen').classList.add('hidden'); document.getElementById('quiz-container').classList.remove('hidden'); renderQuestion(); }

    function renderQuestion() {
        clearInterval(timer); attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = ""; document.getElementById('feedback').innerText = "";
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = o; btn.onclick = () => checkAnswer(o); optDiv.appendChild(btn); });
        timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++; document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct'; feedback.innerText = "Correct!";
            correctSound.play(); confetti(); setTimeout(nextQuestion, 1000);
        } else {
            attempts++; wrongSound.play();
            if(attempts < 2) { feedback.className = 'hint-box'; feedback.innerText = "Hint: " + questions[currentQ].hint; }
            else { feedback.className = 'feedback-correct'; feedback.innerText = "Correct: " + questions[currentQ].a; setTimeout(nextQuestion, 2000); }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else { document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer; margin-top:20px;">Restart Quiz</button>`; }
    }
</script>
</body>
</html>
